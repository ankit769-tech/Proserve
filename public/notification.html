<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - ProServe</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body{background:#f8f9fa;}
        .notification-box{
            max-width:700px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 8px 16px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <a href="index.html" class="navbar-brand fw-bold">ProServe</a>
</nav>

<div class="container my-5">

    <h3 class="fw-bold mb-3">Notifications</h3>

    <div class="notification-box mb-3">
        <h6 class="fw-bold">Booking Confirmed</h6>
        <p class="text-muted mb-1">Your booking with Ramesh Kumar is confirmed.</p>
        <small class="text-secondary">2 hours ago</small>
    </div>

    <div class="notification-box">
        <h6 class="fw-bold">Payment Successful</h6>
        <p class="text-muted mb-1">Your fan repair service payment has been received.</p>
        <small class="text-secondary">5 hours ago</small>
    </div>

</div>

<script src="/js/api.js"></script>


</body>
</html>
