<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Service - ProServe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f3f6fa;
        }
        .rating-box{
            max-width:600px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
        }
        .stars span{
            font-size:40px;
            color:#ccc;
            cursor:pointer;
            transition:0.2s;
        }
        .stars span.active{
            color:#fbc02d;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
    <a href="index.html" class="navbar-brand fw-bold">ProServe</a>
</nav>

<div class="container my-5">

    <div class="rating-box mx-auto">

        <h3 class="fw-bold text-center mb-3">Rate Your Service</h3>
        <p class="text-muted text-center mb-4">Your feedback helps us improve our services.</p>

        <h5><strong>Worker:</strong> Ramesh Kumar</h5>
        <p class="text-muted">Electrician • Fan Repair</p>

        <hr class="my-4">

        <h5 class="fw-bold mb-2">Rate Experience</h5>

        <div class="stars mb-3 text-center" id="starContainer">
            <span data-value="1">★</span>
            <span data-value="2">★</span>
            <span data-value="3">★</span>
            <span data-value="4">★</span>
            <span data-value="5">★</span>
        </div>

        <input type="hidden" id="selectedRating">

        <label class="form-label fw-bold">Write a Review</label>
        <textarea id="reviewText" class="form-control mb-3" rows="4" placeholder="Share your experience..."></textarea>

        <div id="errorMsg" class="text-danger mb-3" style="display:none;">
            ❌ Please select rating and write a review!
        </div>

        <button class="btn btn-primary w-100 py-2" onclick="submitRating()">Submit Review</button>

        <div id="successMsg" class="text-success text-center mt-3 fw-bold" style="display:none;">
            ✔ Thank you! Your review has been submitted.
        </div>

    </div>

</div>

<script>
    // Star Rating Logic
    const stars = document.querySelectorAll("#starContainer span");
    stars.forEach(star => {
        star.addEventListener("click", function() {
            let rating = this.getAttribute("data-value");
            document.getElementById("selectedRating").value = rating;

            stars.forEach(s => s.classList.remove("active"));

            for (let i = 0; i < rating; i++) {
                stars[i].classList.add("active");
            }
        });
    });

    // Submit Rating
    function submitRating() {
        let rating = document.getElementById("selectedRating").value;
        let review = document.getElementById("reviewText").value;

        document.getElementById("errorMsg").style.display = "none";
        document.getElementById("successMsg").style.display = "none";

        if (rating === "" || review.trim() === "") {
            document.getElementById("errorMsg").style.display = "block";
            return;
        }

        // SUCCESS MESSAGE
        document.getElementById("successMsg").style.display = "block";

        // Redirect to user dashboard after 1.4s
        setTimeout(() => {
            window.location.href = "user-dashboard.html";
        }, 1400);
    }
</script>

<script src="/js/api.js"></script>


</body>
</html>
