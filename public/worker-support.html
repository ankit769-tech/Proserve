<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Support - ProServe Worker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
 body{font-family:Inter,system-ui;background:linear-gradient(180deg,#fbfbff,#f1f7ff)}
 .cardx{background:white;border-radius:12px;padding:16px;box-shadow:0 10px 28px rgba(15,23,42,0.06)}
 .ticket{border-left:4px solid #7c6cff;padding:12px;border-radius:8px;margin-bottom:10px}
 .mini{color:#64748b;font-size:.9rem}
</style>
</head>
<body>

<div class="container-xl my-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <a class="btn btn-outline-secondary btn-sm" href="worker-dashboard.html"><i class="fa-solid fa-chevron-left"></i> Back</a>
    <h4 class="mb-0">Support & Help</h4>
    <div></div>
  </div>

  <div class="cardx mb-3">
    <h6>Create Support Ticket</h6>
    <div class="row g-2">
      <div class="col-12">
        <label class="form-label small">Subject</label>
        <input id="sub" class="form-control">
      </div>
      <div class="col-12">
        <label class="form-label small">Describe Issue</label>
        <textarea id="desc" class="form-control" rows="4"></textarea>
      </div>
      <div class="col-12 text-end">
        <button class="btn btn-primary" onclick="createTicket()">Submit Ticket</button>
      </div>
    </div>
  </div>

  <div class="cardx">
    <h6>Recent Tickets</h6>
    <div id="tickets" class="mt-2">
      <div class="ticket">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>Payment not reflected</strong><div class="mini">Ticket #3421 • Open</div></div>
          <div class="mini">2 days ago</div>
        </div>
      </div>

      <div class="ticket" style="border-left-color:#10b981">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>Verification status</strong><div class="mini">Ticket #3302 • Resolved</div></div>
          <div class="mini">1 week ago</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
 function createTicket(){
  const s=document.getElementById('sub').value.trim();
  const d=document.getElementById('desc').value.trim();
  if(!s||!d){alert('Please fill subject and description');return}
  const el=document.createElement('div'); el.className='ticket';
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center">
    <div><strong>${s}</strong><div class="mini">Ticket • Open</div></div>
    <div class="mini">Just now</div>
  </div>`;
  document.getElementById('tickets').prepend(el);
  document.getElementById('sub').value=''; document.getElementById('desc').value='';
  alert('Ticket created ✔ Our support will contact you within 24 hours.');
 }
</script>

<script src="/js/api.js"></script>


</body>
</html>
