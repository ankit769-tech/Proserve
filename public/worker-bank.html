<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Bank & Withdraw - ProServe Worker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
 body{font-family:Inter,system-ui;background:linear-gradient(180deg,#fbfdff,#f2f6ff)}
 .cardx{background:white;border-radius:12px;padding:18px;box-shadow:0 10px 28px rgba(15,23,42,0.06)}
 .mini{color:#64748b;font-size:.9rem}
</style>
</head>
<body>

<div class="container-xl my-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <a class="btn btn-outline-secondary btn-sm" href="worker-dashboard.html"><i class="fa-solid fa-chevron-left"></i> Back</a>
    <h4 class="mb-0">Bank & Withdraw</h4>
    <div></div>
  </div>

  <div class="row g-3">
    <div class="col-lg-7">
      <div class="cardx mb-3">
        <h6>Linked Bank Accounts</h6>
        <p class="mini">You can add multiple bank accounts or UPI IDs.</p>
        <div class="list-group">
          <div class="list-group-item d-flex justify-content-between align-items-center">
            <div>
              <strong>State Bank of India</strong><br><small class="mini">A/c • ****1234 • IFSC: SBIN0001234</small>
            </div>
            <div>
              <button class="btn btn-sm btn-outline-secondary me-2">Edit</button>
              <button class="btn btn-sm btn-danger">Remove</button>
            </div>
          </div>
        </div>
      </div>

      <div class="cardx">
        <h6>Add Bank Account</h6>
        <div class="row g-2">
          <div class="col-12">
            <label class="form-label small">Account Holder Name</label>
            <input id="accName" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label small">Bank Name</label>
            <input id="bankName" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label small">Account Number</label>
            <input id="accNo" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label small">IFSC</label>
            <input id="ifsc" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label small">UPI ID (optional)</label>
            <input id="upi" class="form-control">
          </div>
          <div class="col-12 text-end mt-2">
            <button class="btn btn-primary" onclick="addAccount()">Add Account</button>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="cardx mb-3">
        <h6>Available Balance</h6>
        <h2>₹ 8,240</h2>
        <p class="mini">Minimum withdrawal: ₹500</p>
        <label class="form-label small">Withdraw Amount</label>
        <input id="withdrawAmt" class="form-control mb-2" type="number" placeholder="Enter amount">
        <button class="btn btn-success w-100" onclick="requestWithdraw()">Request Withdraw</button>
      </div>

      <div class="cardx">
        <h6>Withdrawal History</h6>
        <div class="mt-2">
          <div class="d-flex justify-content-between mini mb-2"><div>01 Nov</div><div>₹ 2,000 • Paid</div></div>
          <div class="d-flex justify-content-between mini mb-2"><div>10 Oct</div><div>₹ 3,000 • Paid</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
 function addAccount(){
  const name=document.getElementById('accName').value.trim();
  if(!name){alert('Enter account holder name');return;}
  alert('Account added (demo) ✔');
 }
 function requestWithdraw(){
  const amt=Number(document.getElementById('withdrawAmt').value);
  if(!amt || amt<500){alert('Minimum ₹500 required');return;}
  alert('Withdraw request submitted ✔');
 }
</script>

<script src="/js/api.js"></script>


</body>
</html>
