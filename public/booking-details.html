<!DOCTYPE html>
<html lang="en">
<head>

    <title>Booking Details - ProServe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f4f6fb; }
        .details-box {
            max-width:800px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 6px 18px rgba(0,0,0,0.1);
        }
        .status-pill {
            padding:6px 14px;
            border-radius:20px;
            color:white;
            font-size:14px;
        }
        .map-box {
            height:200px;
            background:#dfe6f1;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:bold;
            color:#555;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <a href="user-dashboard.html" class="navbar-brand fw-bold">ProServe</a>
</nav>

<div class="container my-5">

    <div class="details-box">

        <h3 class="fw-bold mb-3">Booking Details</h3>

        <span class="status-pill bg-warning">Pending</span>

        <hr>

        <!-- SERVICE -->
        <h5 class="fw-bold">Service Details</h5>
        <p><strong>Service:</strong> Fan Repair</p>

        <hr>

        <!-- WORKER -->
        <h5 class="fw-bold">Assigned Worker</h5>
        <p><strong>Name:</strong> Ramesh Kumar</p>

        <hr>

        <!-- ADDRESS -->

        <div class="map-box mt-2 mb-4">
            MAP PREVIEW HERE
        </div>

        <!-- ACTIONS -->
        <div class="d-flex gap-2">
            <button class="btn btn-danger">Cancel Booking</button>
            <button class="btn btn-success">Track Worker</button>
        </div>

    </div>

</div>

<script src="/js/api.js"></script>


</body>
</html>
