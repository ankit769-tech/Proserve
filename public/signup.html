<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProServe - Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>

        /* Fade-In Animation */
        .fade-in {
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Slide-Up Animation */
        .slide-up {
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Hover Up Animation */
        .hover-up:hover {
            transform: translateY(-6px);
            transition: 0.3s;
        }

        /* Button Hover Animation */
        .btn-animate {
            transition: 0.3s;
        }

        .btn-animate:hover {
            transform: scale(1.05);
        }

        /* Glow Effect */
        .glow:hover {
            box-shadow: 0 0 20px rgba(13,110,253,0.6);
        }

        body {
            background: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')
                        center/cover no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-box {
            width: 380px;
            padding: 35px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            color: white;
        }

        input {
            border-radius: 10px;
            height: 45px;
        }

        .btn-primary {
            border-radius: 25px;
            height: 45px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="glass-box fade-in">
    <h3 class="text-center fw-bold mb-4">Create Account</h3>

    <!-- Added IDs -->
    <input id="signupName" type="text" class="form-control mb-3" placeholder="Full Name">
    <input id="signupEmail" type="email" class="form-control mb-3" placeholder="Email Address">
    <input id="signupPhone" type="number" class="form-control mb-3" placeholder="Phone Number">
    <input id="signupPassword" type="password" class="form-control mb-3" placeholder="Password">

    <!-- Role: by default customer (no UI change) -->
    <!-- If later you want dropdown for role, we can add it -->

    <button onclick="handleSignup()" class="btn btn-primary w-100 mb-3 btn-animate glow">
        Sign Up
    </button>

    <p class="text-center">
        Already have an account?
        <a href="login.html" class="text-warning fw-bold">Login</a>
    </p>
</div>

<script>
    async function handleSignup() {
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const phone = document.getElementById('signupPhone').value.trim();
        const password = document.getElementById('signupPassword').value.trim();
        const role = 'customer'; // default, since UI me role field nahi hai

        if (!name || !email || !password) {
            alert('Please fill name, email and password');
            return;
        }

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, phone, password, role })
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.message || 'Signup failed');
            }

            // Save token + user in localStorage
            if (data.token) {
                localStorage.setItem('ps_token', data.token);
            }
            if (data.user) {
                localStorage.setItem('ps_user', JSON.stringify(data.user));
                localStorage.setItem('ps_name', data.user.name || name);
            }

            // Customer ko user-dashboard pe bhejo
            window.location.href = 'user-dashboard.html';

        } catch (err) {
            alert('Signup failed: ' + err.message);
        }
    }

    
</script>

</body>
</html>
