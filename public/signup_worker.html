<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProServe Worker Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --p: #0d6efd;
            --s: #22c55e;
            --d: #ef4444;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI';
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            max-width: 900px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .2);
        }

        .progress {
            height: 8px;
            border-radius: 10px;
            margin-bottom: 20px;
            background: #e9ecef;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--p), #764ba2);
            transition: width .4s;
        }

        .step-labels {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }

        .step-label {
            text-align: center;
            flex: 1;
        }

        .step-number {
            display: block;
            font-size: 18px;
            font-weight: bold;
            background: var(--p);
            color: white;
            width: 30px;
            height: 30px;
            line-height: 30px;
            border-radius: 50%;
            margin: auto;
        }

        .step-title {
            display: block;
            margin-top: 5px;
            font-size: 12px;
            color: #555;
        }

        .step-label.active .step-number {
            background: var(--s);
            /* highlight active step */
        }

        .step-label.active .step-title {
            font-weight: bold;
            color: #000;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .form-control {
            border-radius: 10px;
            border: 2px solid #dee2e6;
            padding: 12px;
        }

        .form-control:focus {
            border-color: var(--p);
            box-shadow: 0 0 0 .2rem rgba(13, 110, 253, .25);
        }

        .is-invalid {
            border-color: var(--d) !important;
        }

        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .otp-input {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            border: 2px solid #dee2e6;
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            cursor: text;
        }

        .otp-input:focus {
            border-color: var(--p);
            box-shadow: 0 0 0 .2rem rgba(13, 110, 253, .25);
            transform: scale(1.05);
        }

        .review-list {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            background: #f8f9fa;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2 class="text-center mb-4 fw-bold">Worker Registration</h2>
        <div class="progress">
            <div class="progress-bar" id="pb" style="width:16%"></div>
        </div>
        <div class="step-labels">
            <div class="step-label active">
                <span class="step-number">1</span>
                <span class="step-title">Personal Info</span>
            </div>
            <div class="step-label">
                <span class="step-number">2</span>
                <span class="step-title">Professional Details</span>
            </div>
            <div class="step-label">
                <span class="step-number">3</span>
                <span class="step-title">Location & Availability</span>
            </div>
            <div class="step-label">
                <span class="step-number">4</span>
                <span class="step-title">Document Verification</span>
            </div>
            <div class="step-label">
                <span class="step-number">5</span>
                <span class="step-title">Bank Details</span>
            </div>
            <div class="step-label">
                <span class="step-number">6</span>
                <span class="step-title">Review & Submit</span>
            </div>
        </div>

        <div class="step active" id="s1">
            <div class="row g-3">
                <div class="col-md-6">
                    <label>First Name*</label>
                    <input class="form-control" id="f1">
                </div>
                <div class="col-md-6">
                    <label>Last Name*</label>
                    <input class="form-control" id="l1">
                </div>
                <div class="col-12">
                    <label>Email*</label>
                    <input type="email" class="form-control" id="e1">
                </div>


                <div class="col-md-4"><label>Code</label><select class="form-select" id="c1">
                        <option>+91</option>
                    </select></div>
                <div class="col-md-8"><label>Phone*</label><input class="form-control" id="p1" placeholder="9876543210">
                </div>
                <div class="col-md-6">
                    <label>OTP*</label>
                    <button class="btn btn-outline-primary btn-sm mb-2" onclick="otpBtn()">Send OTP</button>
                    <div class="otp-inputs">
                        <input class="otp-input" maxlength="1">
                        <input class="otp-input" maxlength="1">
                        <input class="otp-input" maxlength="1">
                        <input class="otp-input" maxlength="1">
                        <input class="otp-input" maxlength="1">
                        <input class="otp-input" maxlength="1">
                    </div>
                    <div class="text-danger small mt-1 d-none" id="oerr">Demo: 123456</div>
                </div>
                <div class="col-md-6"><label>DOB*</label><input type="date" class="form-control" id="d1"></div>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <button class="btn btn-outline-secondary" onclick="next(1)">Back</button>
                <button class="btn btn-primary px-4" onclick="next(2)">Next </button>
            </div>
        </div>

        <div class="step" id="s2">
            <div class="row g-3">
                <div class="col-md-6">
                    <label>Service*</label>
                    <select class="form-select" id="cat" onchange="otog()">
                        <option>Select</option>
                        <option value="p">Plumber</option>
                        <option value="e">Electrician</option>
                        <option value="c">Carpenter</option>
                        <option value="pa">Painter</option>
                        <option value="cl">Cleaning</option>
                        <option value="ac">AC</option>
                        <option value="o">Other</option>
                    </select>
                    <input class="form-control mt-1 d-none" id="ocat" placeholder="Specify service">
                </div>
                <div class="col-md-6"><label>Years*</label><input type="number" class="form-control" id="exp" min="0">
                </div>
                <div class="col-12"><label>About</label><textarea class="form-control" id="abt" rows="3"></textarea>
                </div>
            </div>
            <div class="d-flex mt-4">
                <button class="btn btn-outline-secondary me-3" onclick="next(1)">Back</button>
                <button class="btn btn-primary" onclick="next(3)">Next</button>
            </div>
        </div>

        <div class="step" id="s3">
            <div class="row g-3">
                <div class="col-md-6"><label>City*</label><input class="form-control" id="ct"></div>
                <div class="col-md-6">
                    <label>Radius*</label>
                    <select class="form-select" id="rad">
                        <option>Select</option>
                        <option>5km</option>
                        <option>10km</option>
                        <option>20km</option>
                        <option>50km</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label>Days*</label>
                    <div class="border p-2 rounded">
                        <label class="d-block small me-2"><input type="checkbox" class="me-1" id="m1">Mon</label>
                        <label class="d-block small me-2"><input type="checkbox" class="me-1" id="t2">Tue</label>
                        <label class="d-block small me-2"><input type="checkbox" class="me-1" id="w3">Wed</label>
                        <label class="d-block small me-2"><input type="checkbox" class="me-1" id="th4">Thu</label>
                        <label class="d-block small me-2"><input type="checkbox" class="me-1" id="f5">Fri</label>
                        <label class="d-block small me-2"><input type="checkbox" class="me-1" id="sa6">Sat</label>
                        <label class="d-block small"><input type="checkbox" class="me-1" id="su7">Sun</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <label>Hours*</label>
                    <div class="row g-2">
                        <div class="col-6"><input type="time" class="form-control" id="st"></div>
                        <div class="col-6"><input type="time" class="form-control" id="en"></div>
                    </div>
                </div>
            </div>
            <div class="d-flex mt-4">
                <button class="btn btn-outline-secondary me-3" onclick="next(2)">Back</button>
                <button class="btn btn-primary" onclick="next(4)">Next</button>
            </div>
        </div>

        <div class="step" id="s4">
            <div class="row g-3">
                <div class="col-md-4"><label>ID*</label><input type="file" class="form-control" id="id"></div>
                <div class="col-md-4"><label>PAN*</label><input type="file" class="form-control" id="p"></div>
                <div class="col-md-4"><label>Portfolio*</label><input type="file" class="form-control" id="pf" multiple>
                </div>
            </div>
            <div class="d-flex mt-4">
                <button class="btn btn-outline-secondary me-3" onclick="next(3)">Back</button>
                <button class="btn btn-primary" onclick="next(5)">Next</button>
            </div>
        </div>

        <div class="step" id="s5">
            <div class="row g-3">
                <div class="col-md-4"><label>Bank</label><input class="form-control" id="b1"></div>
                <div class="col-md-4"><label>Acc No</label><input class="form-control" id="a1"></div>
                <div class="col-md-4"><label>IFSC</label><input class="form-control" id="i1" placeholder="SBIN0DEF456">
                </div>
            </div>
            <div class="d-flex mt-4">
                <button class="btn btn-outline-secondary me-3" onclick="next(4)">Back</button>
                <button class="btn btn-primary" onclick="next(6)">Review</button>
            </div>
        </div>

        <div class="step" id="s6">
            <div class="review-list">
                <h5>Review Your Details</h5>
                <div id="reviewData"></div>
            </div>
            <div class="d-flex mt-4">
                <button class="btn btn-outline-secondary me-3" onclick="next(5)">Edit</button>
                <button class="btn btn-success" onclick="finalSubmit()">Final Submit</button>
            </div>
        </div>

        <div class="step" id="s7">
            <div class="text-center py-5">
                <i class="fas fa-check-circle text-success fs-1 mb-3"></i>
                <h2 class="text-success mb-3">Success!</h2>
                <p>Your profile is under review. You will be notified within <strong>24 hours</strong>.</p>
                <button class="btn btn-primary btn-lg" onclick="location.href='home.html'">Go to Home</button>
            </div>
        </div>

        <script>
            let cs = 1;

            const OTP_DEMO = '123456';


            function next(n) {
                if (n > cs && !check()) return;
                cs = n;
                document.querySelectorAll('.step').forEach((s, i) => s.classList.toggle('active', i + 1 == n));
                document.querySelectorAll('.step-label').forEach((lbl, idx) => {
                    lbl.classList.toggle('active', idx < n);
                });
                document.getElementById('pb').style.width = Math.min((n / 6) * 100, 100) + '%';
                if (n === 6) {
                    updateReview();
                }
            }

            function check() {
                document.querySelectorAll('.is-invalid').forEach(e => e.classList.remove('is-invalid'));
                document.getElementById('oerr').classList.add('d-none');
                let ok = true;
                if (cs == 1) {
                    ['f1', 'l1', 'e1', 'p1', 'd1'].forEach(id => {
                        let el = document.getElementById(id);
                        if (!el.value.trim()) { el.classList.add('is-invalid'); ok = false; }
                    });
                    let otp = Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
                    if (otp != OTP_DEMO) {
                        document.querySelectorAll('.otp-input').forEach(i => i.classList.add('is-invalid'));
                        document.getElementById('oerr').classList.remove('d-none');
                        ok = false;
                    }
                }
                if (cs == 2) {
                    let c = document.getElementById('cat').value;
                    if (!c) { document.getElementById('cat').classList.add('is-invalid'); ok = false; }
                    else if (c == 'o' && !document.getElementById('ocat').value.trim()) { document.getElementById('ocat').classList.add('is-invalid'); ok = false; }
                    if (!document.getElementById('exp').value) { document.getElementById('exp').classList.add('is-invalid'); ok = false; }
                }
                if (cs == 3) {
                    if (!document.getElementById('ct').value.trim()) document.getElementById('ct').classList.add('is-invalid'), ok = false;
                    if (!document.getElementById('rad').value) document.getElementById('rad').classList.add('is-invalid'), ok = false;
                    let dchk = ['m1', 't2', 'w3', 'th4', 'f5', 'sa6', 'su7'].filter(id => document.getElementById(id).checked).length;
                    if (dchk == 0) { document.querySelectorAll('#s3 input[type=checkbox]').forEach(c => c.classList.add('is-invalid')); ok = false; }
                    if (!document.getElementById('st').value || !document.getElementById('en').value) { ['st', 'en'].forEach(id => document.getElementById(id).classList.add('is-invalid')); ok = false; }
                }
                if (cs == 4) { ['id', 'p', 'pf'].forEach(id => { if (!document.getElementById(id).files.length) { document.getElementById(id).classList.add('is-invalid'); ok = false; } }); }
                return ok;
            }

            function otpBtn() {
                let ph = document.getElementById('p1').value.replace(/\D/g, '');
                if (ph.length != 10) return alert('10 digit phone');
                document.querySelector('button[onclick="otpBtn()"]').disabled = true;
                document.querySelector('button[onclick="otpBtn()"]').textContent = 'Sent - 123456';
                document.querySelector('.otp-input').focus();
            }

            function otog() {
                document.getElementById('ocat').style.display = document.getElementById('cat').value == 'o' ? 'block' : 'none';
            }

            function updateReview() {
                const data = {
                    name: document.getElementById('f1').value + ' ' + document.getElementById('l1').value,
                    email: document.getElementById('e1').value,
                    phone: document.getElementById('p1').value,
                    service: document.getElementById('cat').value == 'o'
                        ? document.getElementById('ocat').value
                        : document.querySelector('#cat option:checked').textContent,
                    exp: document.getElementById('exp').value,
                    city: document.getElementById('ct').value,
                    bank: document.getElementById('b1').value,
                    acc: document.getElementById('a1').value,
                    ifsc: document.getElementById('i1').value
                };

                document.getElementById('reviewData').innerHTML = `
      <div class="row">
        <div class="col-md-6"><strong>Name:</strong> ${data.name}</div>
        <div class="col-md-6"><strong>Email:</strong> ${data.email}</div>
        <div class="col-md-6"><strong>Phone:</strong> ${data.phone}</div>
        <div class="col-md-6"><strong>Service:</strong> ${data.service}</div>
        <div class="col-md-6"><strong>Exp:</strong> ${data.exp} yrs</div>
        <div class="col-md-6"><strong>City:</strong> ${data.city}</div>
        <div class="col-md-6"><strong>Bank:</strong> ${data.bank}</div>
        <div class="col-md-6"><strong>Acc:</strong> ${data.acc}</div>
        <div class="col-md-12"><strong>IFSC:</strong> ${data.ifsc}</div>
      </div>`;
            }

            data = {
                name: document.getElementById('f1').value + ' ' + document.getElementById('l1').value,
                email: document.getElementById('e1').value,
                phone: document.getElementById('p1').value,
                service: document.getElementById('cat').value == 'o' ? document.getElementById('ocat').value : document.querySelector('#cat option:checked').textContent,
                exp: document.getElementById('exp').value,
                city: document.getElementById('ct').value,
                bank: document.getElementById('b1').value,
                acc: document.getElementById('a1').value,
                ifsc: document.getElementById('i1').value
            };
            document.getElementById('reviewData').innerHTML = `
  <div class="row">
   <div class="col-md-6"><strong>Name:</strong> ${data.name}</div>
   <div class="col-md-6"><strong>Email:</strong> ${data.email}</div>
   <div class="col-md-6"><strong>Phone:</strong> ${data.phone}</div>
   <div class="col-md-6"><strong>Service:</strong> ${data.service}</div>
   <div class="col-md-6"><strong>Exp:</strong> ${data.exp} yrs</div>
   <div class="col-md-6"><strong>City:</strong> ${data.city}</div>
   <div class="col-md-6"><strong>Bank:</strong> ${data.bank}</div>
   <div class="col-md-6"><strong>Acc:</strong> ${data.acc}</div>
   <div class="col-md-12"><strong>IFSC:</strong> ${data.ifsc}</div>
  </div>`;


            function finalSubmit() {
                if (!check()) return;
                updateReview(); // Use live review
                next(7);
            }


            document.querySelectorAll('.otp-input').forEach((i, idx, arr) => {
                i.oninput = e => {
                    e.target.value = e.target.value.replace(/\D/g, '').slice(0, 1);
                    if (e.target.value && idx < 5) arr[idx + 1].focus();
                    document.querySelectorAll('.otp-input').forEach(f => f.classList.remove('is-invalid'));
                    document.getElementById('oerr').classList.add('d-none');
                };
                i.onfocus = () => i.select();
            });
            document.oninput = e => e.target.classList.remove('is-invalid');
        </script>
</body>

</html>
