<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Earnings - ProServe Worker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
  :root{--accent:#7c6cff;--muted:#64748b}
  body{background:linear-gradient(180deg,#fbfbff,#f2f5ff);font-family:Inter,system-ui;}
  .top{background:linear-gradient(135deg,var(--accent),#10b981);color:white;padding:18px;border-radius:12px;box-shadow:0 12px 28px rgba(124,108,255,0.08)}
  .card-soft{background:white;border-radius:12px;padding:16px;box-shadow:0 10px 28px rgba(15,23,42,0.06)}
  .mini{font-size:0.85rem;color:var(--muted)}
  .tx-item{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid #f1f5f9}
</style>
</head>
<body>

<div class="container-xl my-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <a href="worker-dashboard.html" class="btn btn-outline-secondary btn-sm"><i class="fa-solid fa-chevron-left"></i> Back</a>
    <h4 class="mb-0">Earnings & Payouts</h4>
    <div></div>
  </div>

  <div class="row g-3">
    <div class="col-lg-8">
      <div class="top mb-3">
        <div class="d-flex align-items-center justify-content-between">
          <div>
            <div class="small-muted">Total Balance</div>
            <h2 style="margin:0">₹ 12,450</h2>
            <div class="mini">Available for withdrawal: ₹ 8,240</div>
          </div>
          <div>
            <button class="btn btn-light btn-sm me-2" onclick="location.href='worker-bank.html'"><i class="fa-solid fa-landmark me-1"></i> Bank</button>
            <button class="btn btn-primary btn-sm" onclick="withdrawNow()">Withdraw</button>
          </div>
        </div>
      </div>

      <div class="card-soft mb-3">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h6 class="mb-0">Weekly Earnings</h6>
            <div class="mini">This week performance</div>
          </div>
          <div class="mini">Last updated: Today</div>
        </div>
        <canvas id="earnChart" style="max-height:220px;margin-top:12px"></canvas>
      </div>

      <div class="card-soft">
        <h6>Recent Transactions</h6>
        <div id="txList" class="mt-2"></div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card-soft mb-3 text-center">
        <h6>This Month</h6>
        <h3>₹ 8,240</h3>
        <div class="mini">Earnings after fees</div>
        <hr>
        <button class="btn btn-outline-primary w-100" onclick="location.href='worker-history.html'">View Jobs</button>
      </div>

      <div class="card-soft">
        <h6>Payout Settings</h6>
        <p class="mini">Manage your bank account and payout preferences.</p>
        <button class="btn btn-primary w-100" onclick="location.href='worker-bank.html'">Manage Bank</button>
      </div>
    </div>
  </div>
</div>

<script>
  const labels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const data=[700,1200,850,900,1500,880,420];

  new Chart(document.getElementById('earnChart'),{
    type:'bar',
    data:{labels, datasets:[{label:'Earnings (₹)',data,backgroundColor:'rgba(124,108,255,0.85)',borderRadius:6}]},
    options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}
  });

  const txs = [
    {id:'T-1001',date:'Nov 23',amount:300,status:'Paid'},
    {id:'T-1002',date:'Nov 21',amount:500,status:'Paid'},
    {id:'T-1003',date:'Nov 20',amount:150,status:'Pending'},
  ];

  const txList = document.getElementById('txList');
  txs.forEach(t=>{
    const el=document.createElement('div'); el.className='tx-item';
    el.innerHTML=`<div><strong>${t.id}</strong><div class="mini">${t.date}</div></div>
    <div style="text-align:right"><div>₹ ${t.amount}</div><div class="mini">${t.status}</div></div>`;
    txList.appendChild(el);
  });

  function withdrawNow(){
    alert('Withdrawal request initiated. (Demo)');
  }
</script>

<script src="/js/api.js"></script>

</body>
</html>
