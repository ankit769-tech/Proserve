<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Earnings - Worker Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f8f9fa; }
        .sidebar{height:100vh;background:#0d6efd;color:white;padding:20px;}
        .sidebar a{color:white;text-decoration:none;display:block;padding:10px 0;}
        .sidebar a:hover{background:rgba(255,255,255,0.3);}
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-3 sidebar">
            <h2 class="fw-bold mb-4">Worker Panel</h2>
            <a href="dashboard-worker.html">Dashboard</a>
            <a href="my-services.html">My Services</a>
            <a href="earnings.html">Earnings</a>
            <a href="reviews.html">Reviews</a>
            <a href="profile.html">Profile / Settings</a>
            <a href="index.html" class="text-warning mt-5">Logout</a>
        </div>

        <div class="col-md-9 p-4">

            <h2 class="fw-bold mb-4">Earnings Summary</h2>

            <div class="row g-4 mb-4">

                <div class="col-md-4">
                    <div class="card shadow text-center p-3">
                        <h4 class="fw-bold">₹ 12,500</h4>
                        <p class="text-muted">Total Earnings</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow text-center p-3">
                        <h4 class="fw-bold">₹ 3,400</h4>
                        <p class="text-muted">This Week</p>
                    </div>
                </div>

            </div>

            <h4 class="fw-bold">Recent Payments</h4>

            <div class="card shadow mt-3">
                <div class="card-body">

                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Service</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr>
                                <td>23 Nov</td>
                                <td>Fan Repair</td>
                                <td>₹300</td>
                                <td><span class="badge bg-success">Paid</span></td>
                            </tr>

                            <tr>
                                <td>22 Nov</td>
                                <td>Switch Board Fix</td>
                                <td>₹250</td>
                                <td><span class="badge bg-success">Paid</span></td>
                            </tr>

                        </tbody>
                    </table>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="/js/api.js"></script>


</body>
</html>
