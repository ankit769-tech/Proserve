<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile - Worker Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f8f9fa; }
        .sidebar{height:100vh;background:#0d6efd;color:white;padding:20px;}
        .sidebar a{color:white;text-decoration:none;display:block;padding:10px 0;}
        .sidebar a:hover{background:rgba(255,255,255,0.3);}
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-3 sidebar">
            <h2 class="fw-bold mb-4">Worker Panel</h2>
            <a href="dashboard-worker.html">Dashboard</a>
            <a href="my-services.html">My Services</a>
            <a href="earnings.html">Earnings</a>
            <a href="reviews.html">Reviews</a>
            <a href="profile.html">Profile / Settings</a>
            <a href="index.html" class="text-warning mt-5">Logout</a>
        </div>

        <div class="col-md-9 p-4">

            <h2 class="fw-bold mb-4">Profile & Settings</h2>

            <div class="card shadow p-4">

                <h4 class="fw-bold mb-3">Personal Information</h4>

                <input type="text" class="form-control mb-3" value="Ramesh Kumar">
                <input type="text" class="form-control mb-3" value="Electrician">
                <input type="text" class="form-control mb-3" value="4 Years Experience">
                <input type="text" class="form-control mb-3" value="Delhi, India">

                <button class="btn btn-primary">Save Changes</button>

                <hr class="my-4">

                <h4 class="fw-bold mb-3">Account Settings</h4>

                <input type="password" class="form-control mb-3" placeholder="New Password">
                <input type="password" class="form-control mb-3" placeholder="Confirm Password">

                <button class="btn btn-warning">Update Password</button>

            </div>

        </div>

    </div>
</div>

<script src="/js/api.js"></script>


</body>
</html>
