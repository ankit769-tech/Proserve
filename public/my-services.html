<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Services - Worker Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f8f9fa; }
        .sidebar{height:100vh;background:#0d6efd;color:white;padding:20px;}
        .sidebar a{color:white;text-decoration:none;display:block;padding:10px 0;}
        .sidebar a:hover{background:rgba(255,255,255,0.2);padding-left:5px;}
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-3 sidebar">
            <h2 class="fw-bold mb-4">Worker Panel</h2>
            <a href="dashboard-worker.html">Dashboard</a>
            <a href="my-services.html">My Services</a>
            <a href="earnings.html">Earnings</a>
            <a href="reviews.html">Reviews</a>
            <a href="profile.html">Profile / Settings</a>
            <a href="index.html" class="text-warning mt-4">Logout</a>
        </div>

        <div class="col-md-9 p-4">

            <h2 class="fw-bold mb-4">My Services</h2>

            <button class="btn btn-primary mb-3">+ Add New Service</button>

            <div class="row g-4">

                <div class="col-md-4">
                    <div class="card shadow">
                        <div class="card-body">
                            <h5 class="card-title">Fan Repair</h5>
                            <p class="text-muted">Price: ₹300</p>
                            <p class="text-muted">Estimated time: 45 mins</p>
                            <button class="btn btn-warning btn-sm">Edit</button>
                            <button class="btn btn-danger btn-sm">Delete</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow">
                        <div class="card-body">
                            <h5 class="card-title">Switch Board Fix</h5>
                            <p class="text-muted">Price: ₹250</p>
                            <p class="text-muted">Estimated time: 30 mins</p>
                            <button class="btn btn-warning btn-sm">Edit</button>
                            <button class="btn btn-danger btn-sm">Delete</button>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="/js/api.js"></script>


</body>
</html>
