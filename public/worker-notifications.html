<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Notifications - ProServe Worker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
 body{font-family:Inter,system-ui;background:#f6f8ff}
 .cardx{background:white;border-radius:12px;padding:14px;box-shadow:0 10px 28px rgba(2,6,23,0.06)}
 .notif{display:flex;gap:12px;padding:12px;border-bottom:1px solid #f1f5f9;align-items:center}
 .unread{background:linear-gradient(90deg,#eef2ff,#fbfffe);border-radius:10px}
 .time{font-size:.8rem;color:#64748b}
</style>
</head>
<body>

<div class="container-xl my-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <a class="btn btn-outline-secondary btn-sm" href="worker-dashboard.html"><i class="fa-solid fa-chevron-left"></i> Back</a>
    <h4 class="mb-0">Notifications</h4>
    <button class="btn btn-outline-primary btn-sm" onclick="markAllRead()">Mark all read</button>
  </div>

  <div class="cardx">
    <div id="list">
      <div class="notif unread">
        <div><i class="fa-solid fa-bell fa-lg text-primary"></i></div>
        <div>
          <div><strong>New Booking Request</strong></div>
          <div class="time">You have a new booking request from Amit Verma • 5 mins ago</div>
        </div>
      </div>

      <div class="notif">
        <div><i class="fa-solid fa-check-circle fa-lg text-success"></i></div>
        <div>
          <div><strong>Payout Completed</strong></div>
          <div class="time">₹2,000 payout completed • 1 day ago</div>
        </div>
      </div>

      <div class="notif unread">
        <div><i class="fa-solid fa-star fa-lg text-warning"></i></div>
        <div>
          <div><strong>New Review</strong></div>
          <div class="time">You received 5★ review from Rajesh • 2 days ago</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
 function markAllRead(){
  document.querySelectorAll('.notif').forEach(n=>n.classList.remove('unread'));
  alert('All notifications marked read');
 }
</script>


<script src="/js/api.js"></script>

</body>
</html>
